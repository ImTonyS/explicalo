<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explicalo</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body>
    <nav class="py-2">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- Logo -->
                <div class="flex-shrink-0 flex items-center">
                    <span class="text-primary text-2xl font-bold">Explicalo.</span>
                </div>
                <!-- NavLink -->
                <div class="hidden sm:block ml-auto">
                    <div class="ml-10 flex items-baseline space-x-4">
                        <a href="/" class="text-primary font-bold hover:underline px-3 py-2 text-sm">Inicio</a>
                        <a href="/posts" class="text-primary font-bold hover:underline px-3 py-2 text-sm">Descubre</a>
                        <a href="/postea" class="text-primary border border-primary px-6 py-[10px] rounded-full hover:bg-primary hover:text-white text-sm font-bold">Postea</a>
                    </div>
                </div>

                <div class="sm:hidden flex items-center">
                    <button id="mobile-menu-btn" type="button" class="text-black hover:text-primary focus:outline-none focus:text-primary" aria-label="Toggle menu">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                        </svg>
                          
                    </button>
                </div>
            </div>
        </div>
        <div id="mobile-menu" class=" sm:hidden">
            <div class="px-2 pt-2 pb-2 space-y-1">
                <a href="/" class="text-primary font-bold hover:underline block px-3 py-2 text-sm">Inicio</a>
                <a href="/posts" class="text-primary font-bold hover:underline block px-3 py-2 text-sm">Descubre</a>
                <div class="px-2 py-2">
                    <a href="/postea" class="text-primary border border-primary px-6 py-[8px] rounded-full hover:bg-primary hover:text-white text-sm font-bold">Postea</a>
                </div>
            </div>
        </div>
    </nav>
    <!-- /Navbar -->

    <!-- Hero -->
    <section class="hero text-black py-32">
        <div class="container max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <h4 class="text-5xl text-center sm:text-7xl sm:text-left font-bold text-primary">Bienvenido a Explicalo.</h4>
            <p class="text-3xl text-center mt-6 font-normal w-full sm:text-right sm:text-5xl "><span class="text-primary font-bold">¿</span>Alguna vez deseaste que te explicaran algo de otra manera<span class="text-primary font-bold">?</span></p>
            <h1 class="text-5xl mt-10 text-center font-bold text-primary sm:text-left sm:text-7xl">Explicalo.</h1>
            <p class="text-4xl mt-8 text-center font-medium text-black sm:text-left sm:text-5xl">Seguro alguien está pasando por lo mismo.</p>

            <div class="mt-20">
                <div class="mt-6 flex items-center justify-center gap-3 sm:gap-10">
                    <a href="/postea" class="text-primary border border-primary px-8 sm:px-10 py-[10px] text-2xl sm:text-4xl rounded-lg hover:bg-primary hover:text-white font-bold">Postea</a>
                    <a href="/posts" class="text-primary border border-primary px-8 sm:px-10 py-[10px] text-2xl sm:text-4xl rounded-lg hover:bg-primary hover:text-white font-bold">Descubre</a>
                </div>
            </div>
        </div>
    </section>
    

    <script src="js/index.js"></script>
</body>
</html>
