<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postea</title>
    <link rel="stylesheet" href="output.css">
</head>
<body>
    <nav class="py-2">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- Logo -->
                <div class="flex-shrink-0 flex items-center">
                    <span class="text-primary text-2xl font-bold">Explicalo.</span>
                </div>
                <!-- NavLink -->
                <div class="hidden sm:block ml-auto">
                    <div class="ml-10 flex items-baseline space-x-4">
                        <a href="/" class="text-primary font-bold hover:underline px-3 py-2 text-sm">Inicio</a>
                        <a href="#" class="text-primary font-bold hover:underline px-3 py-2 text-sm">Descubre</a>
                    </div>
                </div>

                <div class="sm:hidden flex items-center">
                    <button id="mobile-menu-btn" type="button" class="text-black hover:text-primary focus:outline-none focus:text-primary" aria-label="Toggle menu">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                        </svg>
                          
                    </button>
                </div>
            </div>
        </div>
        <div id="mobile-menu" class=" sm:hidden">
            <div class="px-2 pt-2 pb-2 space-y-1">
                <a href="/" class="text-primary font-bold hover:underline block px-3 py-2 text-sm">Inicio</a>
                <a href="#" class="text-primary font-bold hover:underline block px-3 py-2 text-sm">Descubre</a>
            </div>
        </div>
    </nav>
    <!-- /Navbar -->

    <!-- hero -->
    <section class="mt-10">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <h2 class="text-2xl text-center font-semibold">sé el autor, y <span class="text-custom-blue">ayuda</span> a los demás.</h2>
            <h1 class=" mt-8 sm:mt-4 text-xl text-white text-center sm:text-left font-medium bg-custom-blue p-3 px-10  rounded-full font-bold">empieza por aqui: </h1>
            
        </div>

        <div class="max-w-4xl mx-auto p-10 mt-10 round rounded-xl bg-custom-blue-base">
            <form action="/next" class="sm:grid sm:grid-cols-2 " method="post">
                <div class="flex flex-col justify-start p-2">
                    <label for="name" class="text-primary font-bold">ingresa tu nombre: </label>
                    <input class="mt-2 w-5/6 sm:w-5/6 p-2 border border-primary border-[3px]" type="text" required>
                </div>
                <div class="flex flex-col justify-start items-start p-2">
                    <label for="miSelect" class="text-primary font-bold">categoría: </label>
                    <select id="miSelect" name="miSelect" class="mt-2 w-5/6 sm:w-5/6 p-2 border border-primary border-[3px]" type="text" required >
                        <option value="invalid">Elige una categoría</option>
                        <option value="tech">Tech</option>
                        <option value="lifestyle">Estilo de vida</option>
                        <option value="negocios">Negocios</option>
                        <option value="educacion">Educación</option>
                        <option value="otro">Otro</option>
                    </select>
                </div>

                <div class="flex flex-col justify-start p-2 sm:col-span-2 sm:mx-auto sm:w-5/6">
                    <label for="name" class="text-primary font-bold">titulo de tu post: <span class="text-sm">(algo que defina bien de que hablarás) </span> </label>
                    <input class="mt-2 w-5/6 sm:w-5/6 p-2 border border-primary border-[3px]" type="text" required>
                </div>

                <div class="flex flex-col justify-start p-2 sm:col-span-2 sm:mx-auto sm:w-5/6">
                    <label for="name" class="text-primary font-bold">intro: <span class="text-sm"> </span> </label>
                    <textarea id="textIntro" rows="1" class="textIntro mt-2 w-5/6 sm:w-5/6 border border-primary p-2 border-[3px]"></textarea>
                </div>

                <div class="flex flex-col justify-start p-2 sm:col-span-2 sm:mx-auto sm:w-5/6">
                    <label for="name" class="text-primary font-bold">contenido: <span class="text-sm"> </span> </label>
                    <textarea id="textContent" rows="1" class="textIntro mt-2 w-5/6 sm:w-5/6 border border-primary p-2 border-[3px]"></textarea>
                </div>

                <button type="submit" class="bg-white text-primary p-2 mx-auto w-2/6 sm:1/6 mt-10 border border-primary border-[4px] font-bold hover:bg-primary hover:text-white sm:col-span-2 ">LISTO</button>
            </form>
        </div>
    </section>
    
    <script src="js/index.js"></script>
</body>
</html>
